    uncanny_dodge: Retain DEX bonus to AC when flat-footed
  - 'sneak_attack_3d6: Sneak attack +3d6'
  - 'trap_sense_2: +2 Reflex and AC vs traps'
  - 'sneak_attack_4d6: Sneak attack +4d6'
  - 'improved_uncanny_dodge: Cannot be flanked'
  - 'sneak_attack_5d6: Sneak attack +5d6'
  - 'trap_sense_3: +3 Reflex and AC vs traps'
  - >-
    special_ability: Rogue special ability (crippling strike, etc.)
  - 'sneak_attack_6d6: Sneak attack +6d6'
  - 'trap_sense_4: +4 Reflex and AC vs traps'
  - 'sneak_attack_7d6: Sneak attack +7d6'
  - >-
    weapon_finesse: Gains Weapon Finesse as a bonus feat
  - >-
    grace_1: +1 competence bonus on Reflex saves (lost in medium/heavy armor
    or load) (TODO: wire up effect)
  - >-
    insightful_strike: Add INT bonus to damage with light/finesse weapons
    (TODO: wire up effect)
  - 'bonus_feat_1: Bonus fighter feat'
  - 'bonus_feat_2: Bonus fighter feat'
  - 'hide_in_plain_sight: Hide while observed'
  - >-
    magical_defense_1: +1 bonus on saves vs spells and spell-like abilities
    (TODO: wire up effect)
  - >-
    weapon_bond: Bond with masterwork weapon; +1d6 damage vs spellcasters
    and creatures with spell-like abilities (TODO: wire up effect)
  - >-
    vicious_strike: Readied attack to disrupt a spellcaster deals double damage
    on hit (TODO: wire up effect)
  - >-
    mind_over_magic_1: Rebound a spell or spell-like ability onto originator
    as spell turning, 1/day (CL = occult slayer level + 5) (TODO: wire up
    effect)
  - >-
    auravision: See magical auras out to 60 ft as detect magic (number of
    auras only) (TODO: wire up effect)
  - >-
    magical_defense_2: Magical defense bonus increases to +2 (TODO: wire up
    effect)
