# rules/core/feats.yaml
#
# All feats (PHB + SRD), sorted alphabetically.
#
# Three feat kinds (the `kind` field):
#
#   always_on   : Applied automatically when the feat is
#                 taken. Never appears in the Buffs panel
#                 -- bonuses go directly to pools.
#                 Examples: Toughness, Lightning Reflexes.
#
#   conditional : Appears in the Buffs panel alongside
#                 spells. The user toggles it on/off per
#                 encounter or per round.
#                 Examples: Power Attack, Combat Expertise,
#                 Dodge.
#
#   passive     : No stat effects at all. Exists only to
#                 open up prerequisites (feat chains) or
#                 to gate prestige classes.
#                 Examples: Point Blank Shot,
#                 Weapon Focus (chain opener).
#
# For conditional feats, an optional `parameter` block
# describes the integer input the user supplies at
# activation time:
#
#   parameter:
#     name       : Display label shown in the buff panel
#                  (e.g. "Points traded")
#     min        : Minimum value (usually 1)
#     max_formula: Formula for the maximum
#                  (e.g. "bab" for Power Attack)
#     default    : Default value when first activated
#
# When a conditional feat has a parameter, the effect
# values reference "$parameter" which the engine
# substitutes at activation time.
#
# Prerequisites use the same vocabulary as the prereq
# system:
#   stat, ability, feat, skill, class_level, race,
#   alignment, proficient_with, can_cast,
#   has_class_feature, creature_type_is,
#   all_of, any_of, none_of.
#
# Effects use the same schema as spells:
#   target, bonus_type, value (int or formula),
#   condition_key, source_label.

