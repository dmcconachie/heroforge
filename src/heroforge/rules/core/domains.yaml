# rules/core/domains.yaml
#
# Map keyed by domain name.
# Fields per entry:
#   granted_power  : description of granted power
#   domain_spells  : map of level (1-9) -> spell name

Air:
  granted_power: Turn or destroy earth creatures as a good cleric turns undead.
    Rebuke, command, or bolster air creatures as an evil cleric rebukes undead.
  domain_spells:
    1: Obscuring Mist
    2: Wind Wall
    3: Gaseous Form
    4: Air Walk
    5: Control Winds
    6: Chain Lightning
    7: Control Weather
    8: Whirlwind
    9: Elemental Swarm
