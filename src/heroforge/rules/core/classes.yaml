    bab_progression: medium
    save_progressions:
      fort: poor
      ref: good
      will: good
    skills_per_level: 6
    class_skills:
      - Appraise
      - Balance
      - Bluff
      - Climb
      - Concentration
      - Craft
      - Decipher Script
      - Diplomacy
      - Disguise
      - Escape Artist
      - Gather Information
      - Hide
      - Jump
      - Knowledge (all)
      - Listen
      - Move Silently
      - Perform
      - Profession
      - Sense Motive
      - Sleight of Hand
      - Speak Language
