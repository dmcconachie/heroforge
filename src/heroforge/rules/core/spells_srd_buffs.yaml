# rules/core/spells_srd_buffs.yaml
#
# Additional buff spells from the SRD that grant
# persistent stat bonuses, not already in
# spells_phb.yaml.
#
# See spells_phb.yaml for schema documentation.

spells:

  # ==========================================================================
  # 0-Level
  # ==========================================================================

  - name: "Guidance"
    category: spell
    source_book: SRD
    note: >-
      +1 competence on one attack roll,
      saving throw, or skill check
    effects:
      - target: attack_all
        bonus_type: competence
        value: 1
      - target: fort_save
        bonus_type: competence
        value: 1
      - target: ref_save
        bonus_type: competence
        value: 1
      - target: will_save
        bonus_type: competence
        value: 1

  - name: "Virtue"
    category: spell
    source_book: SRD
    note: "+1 temporary hit point"
    effects:
      - target: hp_bonus
        bonus_type: untyped
        value: 1

  # ==========================================================================
  # 1st-Level
  # ==========================================================================

  - name: "Protection from Evil"
    category: spell
    source_book: SRD
    note: >-
      +2 deflection AC, +2 resistance on
      saves vs evil creatures
    effects:
      - target: ac
        bonus_type: deflection
        value: 2
      - target: fort_save
        bonus_type: resistance
        value: 2
      - target: ref_save
        bonus_type: resistance
        value: 2
      - target: will_save
        bonus_type: resistance
        value: 2

  - name: "Protection from Good"
    category: spell
    source_book: SRD
    note: >-
      +2 deflection AC, +2 resistance on
      saves vs good creatures
    effects:
      - target: ac
        bonus_type: deflection
        value: 2
      - target: fort_save
        bonus_type: resistance
        value: 2
      - target: ref_save
        bonus_type: resistance
        value: 2
      - target: will_save
        bonus_type: resistance
        value: 2

  - name: "Protection from Chaos"
    category: spell
    source_book: SRD
    note: >-
      +2 deflection AC, +2 resistance on
      saves vs chaotic creatures
    effects:
      - target: ac
        bonus_type: deflection
        value: 2
      - target: fort_save
        bonus_type: resistance
        value: 2
      - target: ref_save
        bonus_type: resistance
        value: 2
      - target: will_save
        bonus_type: resistance
        value: 2

  - name: "Protection from Law"
    category: spell
    source_book: SRD
    note: >-
      +2 deflection AC, +2 resistance on
      saves vs lawful creatures
    effects:
      - target: ac
        bonus_type: deflection
        value: 2
      - target: fort_save
        bonus_type: resistance
        value: 2
      - target: ref_save
        bonus_type: resistance
        value: 2
      - target: will_save
        bonus_type: resistance
        value: 2

  - name: "Magic Weapon"
    category: spell
    source_book: SRD
    note: "+1 enhancement to attack and damage"
    effects:
      - target: attack_all
        bonus_type: enhancement
        value: 1
      - target: damage_all
        bonus_type: enhancement
        value: 1

  - name: "Bless Weapon"
    category: spell
    source_book: SRD
    note: >-
      Weapon is +1 enhancement and good-
      aligned for overcoming DR
    effects:
      - target: attack_all
        bonus_type: enhancement
        value: 1
      - target: damage_all
        bonus_type: enhancement
        value: 1

  - name: "Longstrider"
    category: spell
    source_book: SRD
    note: "+10 ft. enhancement to speed"
    effects:
      - target: speed
        bonus_type: enhancement
        value: 10

  - name: "Jump"
    category: spell
    source_book: SRD
    note: >-
      +10 enhancement on Jump checks
      (+20 at CL 5, +30 at CL 9)
    requires_caster_level: true
    effects:
      - target: skill_jump
        bonus_type: enhancement
        value: >-
          10 + 10 * min(2,
          (caster_level - 1) // 4)

  - name: "Expeditious Retreat"
    category: spell
    source_book: SRD
    note: "+30 ft. enhancement to speed"
    effects:
      - target: speed
        bonus_type: enhancement
        value: 30

  - name: "Doom"
    category: spell
    source_book: SRD
    note: >-
      Target is shaken: -2 on attacks,
      saves, skill checks, ability checks
    effects:
      - target: attack_all
        bonus_type: morale
        value: -2
      - target: fort_save
        bonus_type: morale
        value: -2
      - target: ref_save
        bonus_type: morale
        value: -2
      - target: will_save
        bonus_type: morale
        value: -2

  - name: "Entropic Shield"
    category: spell
    source_book: SRD
    note: >-
      20%% miss chance on ranged attacks
      against you (note only)

  - name: "Ray of Enfeeblement"
    category: spell
    source_book: SRD
    note: >-
      -1d6+1 per 2 CL (max -5) STR
      penalty (use parameter for rolled
      value)
    requires_caster_level: true
    effects:
      - target: str_score
        bonus_type: untyped
        value: >-
          -(1 + min(5,
          caster_level // 2))

  # ==========================================================================
  # 2nd-Level
  # ==========================================================================

  - name: "Blur"
    category: spell
    source_book: SRD
    note: >-
      20%% miss chance for attacks against
      you (note only)

  - name: "Invisibility"
    category: spell
    source_book: SRD
    note: >-
      Invisible; +2 attack vs sighted foes;
      broken by attacking
    effects:
      - target: attack_all
        bonus_type: untyped
        value: 2

  - name: "Spider Climb"
    category: spell
    source_book: SRD
    note: >-
      Climb speed 20 ft.; +8 racial bonus
      on Climb checks (note only)

  - name: "Resist Energy"
    category: spell
    source_book: SRD
    note: >-
      Resist 10 points of chosen energy
      type per attack (note only)

  - name: "Touch of Idiocy"
    category: spell
    source_book: SRD
    note: "-1d6 INT, WIS, CHA (min 1)"
    effects:
      - target: int_score
        bonus_type: untyped
        value: -4
      - target: wis_score
        bonus_type: untyped
        value: -4
      - target: cha_score
        bonus_type: untyped
        value: -4

  # ==========================================================================
  # 3rd-Level
  # ==========================================================================

  - name: "Good Hope"
    category: spell
    source_book: SRD
    note: >-
      +2 morale on attack rolls, damage,
      saves, skill checks, ability checks
    effects:
      - target: attack_all
        bonus_type: morale
        value: 2
      - target: damage_all
        bonus_type: morale
        value: 2
      - target: fort_save
        bonus_type: morale
        value: 2
      - target: ref_save
        bonus_type: morale
        value: 2
      - target: will_save
        bonus_type: morale
        value: 2

  - name: "Displacement"
    category: spell
    source_book: SRD
    note: >-
      50%% miss chance for attacks against
      you (note only)

  - name: "Magic Circle against Evil"
    category: spell
    source_book: SRD
    note: >-
      +2 deflection AC, +2 resistance
      saves vs evil; 10 ft. radius
    effects:
      - target: ac
        bonus_type: deflection
        value: 2
      - target: fort_save
        bonus_type: resistance
        value: 2
      - target: ref_save
        bonus_type: resistance
        value: 2
      - target: will_save
        bonus_type: resistance
        value: 2

  - name: "Magic Circle against Good"
    category: spell
    source_book: SRD
    note: >-
      +2 deflection AC, +2 resistance
      saves vs good; 10 ft. radius
    effects:
      - target: ac
        bonus_type: deflection
        value: 2
      - target: fort_save
        bonus_type: resistance
        value: 2
      - target: ref_save
        bonus_type: resistance
        value: 2
      - target: will_save
        bonus_type: resistance
        value: 2

  - name: "Magic Circle against Chaos"
    category: spell
    source_book: SRD
    note: >-
      +2 deflection AC, +2 resistance
      saves vs chaotic; 10 ft. radius
    effects:
      - target: ac
        bonus_type: deflection
        value: 2
      - target: fort_save
        bonus_type: resistance
        value: 2
      - target: ref_save
        bonus_type: resistance
        value: 2
      - target: will_save
        bonus_type: resistance
        value: 2

  - name: "Magic Circle against Law"
    category: spell
    source_book: SRD
    note: >-
      +2 deflection AC, +2 resistance
      saves vs lawful; 10 ft. radius
    effects:
      - target: ac
        bonus_type: deflection
        value: 2
      - target: fort_save
        bonus_type: resistance
        value: 2
      - target: ref_save
        bonus_type: resistance
        value: 2
      - target: will_save
        bonus_type: resistance
        value: 2

  # ==========================================================================
  # 4th-Level
  # ==========================================================================

  - name: "Stoneskin"
    category: spell
    source_book: SRD
    note: >-
      DR 10/adamantine (max 10 points
      per CL absorbed); note only

  - name: "Death Ward"
    category: spell
    source_book: SRD
    note: >-
      Immune to death effects, energy
      drain, negative energy effects
      (note only)

  - name: "Freedom of Movement"
    category: spell
    source_book: SRD
    note: >-
      Move and attack normally despite
      impediments (grapple, web, slow,
      paralysis, etc.); note only

  - name: "Fire Shield"
    category: spell
    source_book: SRD
    note: >-
      Warm shield: resist cold 10, deal
      1d6+1/CL fire to melee attackers.
      Chill shield: resist fire 10, deal
      1d6+1/CL cold. Note only.

  - name: "Spell Immunity"
    category: spell
    source_book: SRD
    note: >-
      Immune to 1 spell per 4 CL (note
      only)

  # ==========================================================================
  # 5th-Level
  # ==========================================================================

  - name: "Spell Resistance"
    category: spell
    source_book: SRD
    note: >-
      SR = 12 + caster level
    requires_caster_level: true
    effects:
      - target: sr
        bonus_type: untyped
        value: "12 + caster_level"

  - name: "Overland Flight"
    category: spell
    source_book: SRD
    note: >-
      Fly speed 40 ft. (good
      maneuverability); note only

  # ==========================================================================
  # 6th-Level
  # ==========================================================================

  - name: "Transformation"
    category: spell
    source_book: SRD
    note: >-
      +4 enhancement STR, DEX, CON;
      +4 natural armor AC; full BAB;
      cannot cast spells
    effects:
      - target: str_score
        bonus_type: enhancement
        value: 4
      - target: dex_score
        bonus_type: enhancement
        value: 4
      - target: con_score
        bonus_type: enhancement
        value: 4
      - target: ac
        bonus_type: natural_armor
        value: 4

  # ==========================================================================
  # 8th-Level
  # ==========================================================================

  - name: "Iron Body"
    category: spell
    source_book: SRD
    note: >-
      +6 enhancement STR; DR 15/adamantine;
      immune to blindness, critical hits,
      ability damage, disease, drowning,
      electricity, poison, stunning; -6 DEX
      (min 1); half speed
    effects:
      - target: str_score
        bonus_type: enhancement
        value: 6
      - target: dex_score
        bonus_type: untyped
        value: -6

  - name: "Mind Blank"
    category: spell
    source_book: SRD
    note: >-
      Immune to divination and mental
      effects; +8 resistance vs mind-
      affecting (note only)

  - name: "Moment of Prescience"
    category: spell
    source_book: SRD
    note: >-
      +1/CL insight bonus (max +25) to
      one attack, check, or save (one use)
    requires_caster_level: true
    effects:
      - target: attack_all
        bonus_type: insight
        value: "min(25, caster_level)"

  # ==========================================================================
  # 9th-Level
  # ==========================================================================

  - name: "Foresight"
    category: spell
    source_book: SRD
    note: >-
      Never surprised or flat-footed;
      +2 insight to AC and Reflex saves
    effects:
      - target: ac
        bonus_type: insight
        value: 2
      - target: ref_save
        bonus_type: insight
        value: 2
