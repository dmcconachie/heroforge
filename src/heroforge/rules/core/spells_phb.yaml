# rules/core/spells_phb.yaml
#
# Buff spells from the Player's Handbook (PHB) that appear on the Buffs tab.
# These are the spells whose effects feed into BonusPools on the character.
#
# Schema per entry:
#   name                  : Unique spell name (key for BuffRegistry)
#   category              : spell | class | condition | racial | feat | item
#   source_book           : PHB
#   requires_caster_level : true if any effect uses a formula (auto-detected
#                           by the loader, but explicit here for documentation)
#   mutually_exclusive_with: list of buff names that cannot be active simultaneously
#   note                  : hint shown in the buff panel UI
#   effects               : list of BonusEffects
#     - target     : pool key (attack_melee, attack_ranged, attack_all,
#                    damage_melee, damage_ranged, damage_all, ac, fort_save,
#                    ref_save, will_save, str_score, dex_score, con_score,
#                    int_score, wis_score, cha_score, initiative, speed,
#                    hp_bonus, sr)
#       bonus_type : enhancement | morale | luck | deflection | resistance |
#                    competence | circumstance | sacred | profane | insight |
#                    alchemical | armor | shield | natural_armor | size |
#                    dodge | racial | untyped
#       value      : integer OR formula string
#                    Formula variables: caster_level, character_level,
#                    str_mod, dex_mod, con_mod, int_mod, wis_mod, cha_mod,
#                    bab, abs, max, min, floor, ceil, int, round
#       condition  : null (Python-side conditions set by loader for
#                    race/type checks like Enlarge Person humanoid-only)
#       source_label: optional display label; defaults to spell name
#
# Conditional effects (e.g. Enlarge Person humanoid-only) are flagged with
# condition_key — the loader looks this up in a conditions registry and
# attaches the appropriate Python callable.
#
# Spell level headers are comments only; the engine doesn't use spell level
# for buff purposes (it affects slot consumption, not what the buff does).

spells:

  # =========================================================================
  # 0-Level
  # =========================================================================

  - name: "Resistance"
    category: spell
    source_book: PHB
    note: "+1 resistance bonus on saving throws"
    effects:
      - target: fort_save
        bonus_type: resistance
        value: 1
      - target: ref_save
        bonus_type: resistance
        value: 1
      - target: will_save
        bonus_type: resistance
        value: 1

  # =========================================================================
  # 1st Level
  # =========================================================================

  - name: "Bless"
    category: spell
    source_book: PHB
    note: "+1 morale bonus on attack rolls and saves vs. fear"
    effects:
      - target: attack_all
        bonus_type: morale
        value: 1

  - name: "Camouflage"
    category: spell
    source_book: PHB
    note: "+10 circumstance bonus on Hide checks"
    effects:
      - target: skill_hide
        bonus_type: circumstance
        value: 10

  - name: "Combat Readiness"
    category: spell
    source_book: PHB
    requires_caster_level: true
    note: "Insight bonus on attack rolls; scales with CL"
    effects:
      - target: attack_all
        bonus_type: insight
        value: "min(max(1, caster_level // 3), 6)"

  - name: "Conviction"
    category: spell
    source_book: PHB
    requires_caster_level: true
    note: "Morale bonus on saves; scales with CL"
    effects:
      - target: fort_save
        bonus_type: morale
        value: "max(2, 2 + caster_level // 6)"
      - target: ref_save
        bonus_type: morale
        value: "max(2, 2 + caster_level // 6)"
      - target: will_save
        bonus_type: morale
        value: "max(2, 2 + caster_level // 6)"

  - name: "Divine Favor"
    category: spell
    source_book: PHB
    requires_caster_level: true
    note: "Luck bonus on attack and damage; scales with CL (max +3)"
    effects:
      - target: attack_all
        bonus_type: luck
        value: "max(1, caster_level // 3)"
      - target: damage_all
        bonus_type: luck
        value: "max(1, caster_level // 3)"

  - name: "Enlarge Person"
    category: spell
    source_book: PHB
    note: "+2 STR, -2 DEX (humanoids only; size change handled separately)"
    condition_key: humanoid_only
    effects:
      - target: str_score
        bonus_type: enhancement
        value: 2
        condition_key: humanoid_only
      - target: dex_score
        bonus_type: enhancement
        value: -2
        condition_key: humanoid_only

  - name: "Mage Armor"
    category: spell
    source_book: PHB
    note: "+4 armor bonus to AC (or +6 with Armored Mage class feature)"
    effects:
      - target: ac
        bonus_type: armor
        value: 4

  - name: "Nerveskitter"
    category: spell
    source_book: PHB
    note: "+5 insight bonus on initiative"
