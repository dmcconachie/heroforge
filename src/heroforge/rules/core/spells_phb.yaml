  - name: "Nightshield"
    category: spell
    source_book: PHB
    requires_caster_level: true
    note: "Resistance bonus on saves; scales with CL"
    effects:
      - target: fort_save
        bonus_type: resistance
        value: "int(caster_level >= 1) + int(caster_level >= 6) + int(caster_level >= 9)"
      - target: ref_save
        bonus_type: resistance
        value: "int(caster_level >= 1) + int(caster_level >= 6) + int(caster_level >= 9)"
      - target: will_save
        bonus_type: resistance
        value: "int(caster_level >= 1) + int(caster_level >= 6) + int(caster_level >= 9)"

  - name: "Ram's Might"
