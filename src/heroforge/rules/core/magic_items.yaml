# rules/core/magic_items.yaml
#
# Map keyed by item name.
# SRD magic items that grant stat bonuses.
# Loaded via MagicItemLoader.
#
# Items are modeled as buff definitions -- when
# equipped (toggled on), their effects feed into
# the character's BonusPools.
#
# Sorted by slot, then alphabetically.
# Slot order: head, eyes, neck, shoulders, body,
# torso, arms, hands, ring, waist, feet, slotless.

