# rules/core/class_buffs.yaml
#
# Conditional buffs from class features.
# These appear in the Buffs panel like spells.
#
# See spells_phb.yaml for schema documentation.

spells:

  # =====================================================
  # Barbarian
  # =====================================================

  - name: "Barbarian Rage"
    category: class
    source_book: SRD
    note: >-
      +4 STR, +4 CON, +2 morale on Will
      saves, -2 AC; cannot use skills
      requiring patience/concentration
    effects:
      - target: str_score
        bonus_type: morale
        value: 4
      - target: con_score
        bonus_type: morale
        value: 4
      - target: will_save
        bonus_type: morale
        value: 2
      - target: ac
        bonus_type: untyped
        value: -2

  - name: "Greater Rage"
    category: class
    source_book: SRD
    mutually_exclusive_with: ["Barbarian Rage",
                              "Mighty Rage"]
    note: >-
      +6 STR, +6 CON, +3 morale on Will
      saves, -2 AC
    effects:
      - target: str_score
        bonus_type: morale
        value: 6
      - target: con_score
        bonus_type: morale
        value: 6
      - target: will_save
        bonus_type: morale
        value: 3
      - target: ac
        bonus_type: untyped
        value: -2

  - name: "Mighty Rage"
    category: class
    source_book: SRD
    mutually_exclusive_with: ["Barbarian Rage",
                              "Greater Rage"]
    note: >-
      +8 STR, +8 CON, +4 morale on Will
      saves, -2 AC
    effects:
      - target: str_score
        bonus_type: morale
        value: 8
      - target: con_score
        bonus_type: morale
        value: 8
      - target: will_save
        bonus_type: morale
        value: 4
      - target: ac
        bonus_type: untyped
        value: -2

  # =====================================================
  # Monk
  # =====================================================

  - name: "Flurry of Blows"
    category: class
    source_book: SRD
    note: >-
      Extra attack at highest BAB; -2
      penalty on all attacks during flurry
      (removed at monk level 5)
    effects:
      - target: attack_all
        bonus_type: untyped
        value: -2

  # =====================================================
  # Paladin
  # =====================================================

  - name: "Smite Evil"
    category: class
    source_book: SRD
    note: >-
      Add CHA mod to attack roll, paladin
      level to damage against evil target
      (one attack)
    requires_caster_level: false
    effects:
      - target: attack_all
        bonus_type: untyped
        value: "cha_mod"
      - target: damage_all
        bonus_type: untyped
        value: "character_level"

  # =====================================================
  # Bard
  # =====================================================

  - name: "Inspire Courage +1"
    category: class
    source_book: SRD
    note: >-
      +1 morale on attack rolls, weapon
      damage, saves vs charm/fear
    effects:
      - target: attack_all
        bonus_type: morale
        value: 1
      - target: damage_all
        bonus_type: morale
        value: 1
      - target: will_save
        bonus_type: morale
        value: 1

  - name: "Inspire Courage +2"
    category: class
    source_book: SRD
    mutually_exclusive_with: ["Inspire Courage +1",
                              "Inspire Courage +3",
                              "Inspire Courage +4"]
    note: >-
      +2 morale on attack rolls, weapon
      damage, saves vs charm/fear
    effects:
      - target: attack_all
        bonus_type: morale
        value: 2
      - target: damage_all
        bonus_type: morale
        value: 2
      - target: will_save
        bonus_type: morale
        value: 2

  - name: "Inspire Courage +3"
    category: class
    source_book: SRD
    mutually_exclusive_with: ["Inspire Courage +1",
                              "Inspire Courage +2",
                              "Inspire Courage +4"]
    note: >-
      +3 morale on attack rolls, weapon
      damage, saves vs charm/fear
    effects:
      - target: attack_all
        bonus_type: morale
        value: 3
      - target: damage_all
        bonus_type: morale
        value: 3
      - target: will_save
        bonus_type: morale
        value: 3

  - name: "Inspire Courage +4"
    category: class
    source_book: SRD
    mutually_exclusive_with: ["Inspire Courage +1",
                              "Inspire Courage +2",
                              "Inspire Courage +3"]
    note: >-
      +4 morale on attack rolls, weapon
      damage, saves vs charm/fear
    effects:
      - target: attack_all
        bonus_type: morale
        value: 4
      - target: damage_all
        bonus_type: morale
        value: 4
      - target: will_save
        bonus_type: morale
        value: 4

  - name: "Inspire Greatness"
    category: class
    source_book: SRD
    note: >-
      +2 bonus HD (2d10), +2 competence
      on attack, +1 competence on Fort
    effects:
      - target: attack_all
        bonus_type: competence
        value: 2
      - target: fort_save
        bonus_type: competence
        value: 1
      - target: hp_bonus
        bonus_type: untyped
        value: 20

  # =====================================================
  # Ranger
  # =====================================================

  - name: "Favored Enemy +2"
    category: class
    source_book: SRD
    note: >-
      +2 on Bluff, Listen, Sense Motive,
      Spot, Survival checks and weapon
      damage against favored enemy type
    effects:
      - target: damage_all
        bonus_type: untyped
        value: 2

  - name: "Favored Enemy +4"
    category: class
    source_book: SRD
    mutually_exclusive_with: ["Favored Enemy +2",
                              "Favored Enemy +6"]
    note: >-
      +4 on checks and damage against
      favored enemy type
    effects:
      - target: damage_all
        bonus_type: untyped
        value: 4

  - name: "Favored Enemy +6"
    category: class
    source_book: SRD
    mutually_exclusive_with: ["Favored Enemy +2",
                              "Favored Enemy +4"]
    note: >-
      +6 on checks and damage against
      favored enemy type
    effects:
      - target: damage_all
        bonus_type: untyped
        value: 6
