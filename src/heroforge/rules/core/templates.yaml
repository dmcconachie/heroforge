Vampire:
  source_book: MM
  cr_adjustment: '+2'
  la_adjustment: '+8'
  type_change: Undead
  subtype_add:
  - Augmented
  ability_modifiers:
  - ability: str
    value: 6
    bonus_type: racial
  - ability: dex
    value: 4
    bonus_type: racial
  - ability: int
    value: 2
    bonus_type: racial
  - ability: wis
    value: 2
    bonus_type: racial
  - ability: cha
    value: 4
    bonus_type: racial
  natural_armor_bonus: 6
  partially_applicable: false
  special_qualities:
  - Undead traits (no CON score, immunity to mind-affecting)
  - Damage reduction 10/silver and magic
  - Fast healing 5
  - Gaseous form at will
  - Spider climb at will
  - Alternate form (wolf or bat)
  - Children of the night 1/day
  - Create spawn
  - Dominate person 3/day
  - Energy drain (2 negative levels)
  - Blood drain
  - 'Weaknesses: garlic, mirror, running water, wooden stake'
  grants_feats:
  - Alertness
  - Combat Reflexes
  - Dodge
  - Improved Initiative
  - Lightning Reflexes
  note: Becomes Undead; CON score becomes — (treat as 0 for game purposes)
