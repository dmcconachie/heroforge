# rules/core/templates.yaml
#
# Map keyed by template name.
# Creature templates for D&D 3.5e.
# Source: Monster Manual (MM) and related core books.
#
# Fields per entry:
#   source_book           : MM | MM2 | MM3 | etc.
#   cr_adjustment         : CR change as string (display only)
#   la_adjustment         : Level Adjustment as string
#   type_change           : null, or new creature type string
#   subtype_add           : list of subtypes to add
#   subtype_remove        : list of subtypes to remove
#   ability_modifiers     : list of {ability, value, bonus_type}
#     ability             : str | dex | con | int | wis | cha
#     value               : int or formula string
#     bonus_type          : racial | enhancement | etc.
#   natural_armor_bonus   : int (0 = none)
#   partially_applicable  : bool (true if template has a "level")
#   max_level             : int (maximum level for partial templates)
#   special_qualities     : list of strings (display; mechanics TBD)
#   grants_feats          : list of feat names
#   note                  : display hint

Half-Celestial:
  source_book: MM
  cr_adjustment: '+1'
  la_adjustment: '+4'
  type_change: null
  subtype_add:
  - Good
  - Extraplanar
  ability_modifiers:
  - ability: str
    value: 4
    bonus_type: racial
  - ability: dex
    value: 2
    bonus_type: racial
  - ability: con
    value: 4
    bonus_type: racial
  - ability: int
    value: 2
    bonus_type: racial
  - ability: wis
    value: 4
    bonus_type: racial
  - ability: cha
    value: 4
    bonus_type: racial
  natural_armor_bonus: 1
  partially_applicable: false
  special_qualities:
  - Darkvision 60 ft.
  - Immunity to disease
  - Resistance to acid 10, cold 10, electricity 10
  - Damage reduction 5/magic (if 5 HD or less) or 10/magic (if more)
  - 'Spell resistance: character level + 11'
  - Lay on hands (as paladin of character level)
  - +4 racial bonus on saving throws vs. poison
  grants_feats: []
  note: >-
    Outsider heritage; retains base type but gains Good and Extraplanar subtypes
