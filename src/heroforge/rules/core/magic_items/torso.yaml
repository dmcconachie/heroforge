# rules/core/magic_items/torso.yaml
#
# Torso slot: vests, shirts, partial vestments.
#
# Sorted alphabetically.

Druid's Vestment:
  slot: torso
  note: >-
    Wild shape ability functions one additional
    time per day while worn
Vest of Escape:
  slot: torso
  note: >-
    +6 competence on Escape Artist, +4 competence
    on Open Lock
  effects:
    - target: skill_escape_artist
      bonus_type: competence
      value: 6
    - target: skill_open_lock
      bonus_type: competence
      value: 4
