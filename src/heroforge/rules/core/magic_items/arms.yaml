# rules/core/magic_items/arms.yaml
#
# Arms slot: bracelets, bracers.
#
# Sorted alphabetically.

Bracelet of Friends:
  slot: arms
  note: >-
    Holds 5 charms; break a charm to summon that
    friend (as refuge/teleport) to wearer's side
Bracers of Archery (Greater):
  slot: arms
  note: >-
    +2 competence on attack rolls, +1 competence
    on damage with bows
  effects:
    - target: attack_ranged
      bonus_type: competence
      value: 2
    - target: damage_ranged
      bonus_type: competence
      value: 1
