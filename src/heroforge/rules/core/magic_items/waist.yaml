# rules/core/magic_items/waist.yaml
#
# Waist slot: belts, girdles.
#
# Sorted alphabetically.

Belt of Dwarvenkind:
  slot: waist
  note: >-
    +2 enhancement to CON; darkvision 60 ft;
    dwarven language; +2 CHA toward dwarves
  effects:
    - target: con_score
      bonus_type: enhancement
      value: 2
Belt of Giant Strength +2:
  slot: waist
  note: +2 enhancement to STR
  effects:
    - target: str_score
      bonus_type: enhancement
      value: 2
Belt of Giant Strength +4:
  slot: waist
  note: +4 enhancement to STR
  effects:
    - target: str_score
      bonus_type: enhancement
      value: 4
Belt of Giant Strength +6:
  slot: waist
  note: +6 enhancement to STR
  effects:
    - target: str_score
      bonus_type: enhancement
      value: 6
Monk's Belt:
  slot: waist
  note: >-
    Wearer gets the AC bonus and unarmed damage of a
    5th-level monk (DMG). For a monk, adds 5 to effective
    monk level for AC (and unarmed damage; damage table
    not yet implemented). Contribution to the AC formula
    flows through the effective_monk_level_ac derived
    pool; see rules/core/derived_pools.yaml.
  effects:
    - target: effective_monk_level_ac
      bonus_type: untyped
      value: 5
