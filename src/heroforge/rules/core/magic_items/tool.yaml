# rules/core/magic_items/tool.yaml
#
# Tools: carried magic items used actively (bags,
# figurines, horns, mirrors, rods of utility,
# crystal balls, etc.). They occupy no body slot
# and do not grant ongoing passive benefits.
#
# Sorted alphabetically.

Apparatus of the Crab:
  slot: tool
