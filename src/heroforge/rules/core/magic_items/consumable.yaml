# rules/core/magic_items/consumable.yaml
#
# Consumables: single-use magic items — dusts,
# elixirs, feather tokens, candles that burn out,
# unguents, gems, and the permanent-bump manuals
# and tomes (read once, then destroyed; tracked
# via CharacterLevel inherent_bumps).
#
# Sorted alphabetically.

Candle of Invocation:
  slot: consumable
  note: >-
    +2 morale to attack, saves, and skill checks
    for same-alignment creatures within 30 ft
  effects:
    - target: attack_all
      bonus_type: morale
      value: 2
    - target: fort_save
      bonus_type: morale
      value: 2
    - target: ref_save
      bonus_type: morale
      value: 2
    - target: will_save
      bonus_type: morale
      value: 2
Candle of Truth:
  slot: consumable
  note: >-
    Zone of truth (DC 13 Will) 10 ft radius
    while burning (1 hour)
Dust of Appearance:
  slot: consumable
  note: >-
    Tossed dust reveals invisible creatures,
    mirror images, etc. in 10 ft cube
Dust of Disappearance:
  slot: consumable
  note: >-
    Dust sprinkled on self grants greater
    invisibility (CL 5th) for 2d6 rounds
Dust of Dryness:
  slot: consumable
  note: >-
    One pinch removes up to 100 gal of water
    from a 5 ft cube (or creature; DC 15 Fort)
Dust of Illusion:
  slot: consumable
  note: >-
    Dust transforms user's appearance (as
    disguise self) until washed off
Dust of Tracelessness:
  slot: consumable
  note: >-
    One pinch obscures tracks of up to 10
    humanoids for 250 ft in any direction
Elixir of Fire Breath:
  slot: consumable
  note: >-
    Drink to breathe fire (3 bursts, 4d6 damage;
    DC 15 Ref half); lasts 1 hour
Elixir of Hiding:
  slot: consumable
  note: +10 competence on Hide checks for 1 hour
Elixir of Love:
  slot: consumable
  note: >-
    Drinker becomes enamored of first creature
    seen (as charm person, DC 14 Will) 1 hour
Elixir of Sneaking:
  slot: consumable
  note: >-
    +10 competence on Move Silently checks
    for 1 hour
Elixir of Swimming:
  slot: consumable
  note: +10 competence on Swim checks for 1 hour
Elixir of Truth:
  slot: consumable
  note: >-
    Drinker must speak truthfully (DC 13 Will) for
    10 minutes
Elixir of Vision:
  slot: consumable
  note: +10 competence on Search checks for 1 hour
