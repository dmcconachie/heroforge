Ioun Stone (Iridescent Spindle):
  slot: slotless
  note: Allows breathing indefinitely in any medium
Ioun Stone (Lavender and Green Ellipsoid):
  slot: slotless
  note: >-
    Absorbs spells of 8th level or lower (up to
