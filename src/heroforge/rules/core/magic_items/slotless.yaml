# rules/core/magic_items/slotless.yaml
#
# Slotless: items that grant ongoing passive
# benefits but are not worn in a specific body
# slot (ioun stones orbit, luckstones in pocket,
# mantles as auras).
#
# For carried active-use items (bags, figurines,
# horns, mirrors) see tool.yaml.
# For single-use items (dusts, elixirs, feather
# tokens) see consumable.yaml.
# For ability-bump books see inherent.yaml.
#
# Sorted alphabetically.

Ioun Stone (Clear Spindle):
  slot: slotless
  note: Sustains creature without food or water
Ioun Stone (Dark Blue Rhomboid):
  slot: slotless
  note: >-
    +2 insight bonus on Spot and Listen checks
    (continuous alertness)
  effects:
    - target: skill_spot
      bonus_type: insight
      value: 2
    - target: skill_listen
      bonus_type: insight
      value: 2
Ioun Stone (Deep Red Sphere):
  slot: slotless
  note: +2 enhancement to DEX
  effects:
    - target: dex_score
      bonus_type: enhancement
      value: 2
Ioun Stone (Dusty Rose Prism):
