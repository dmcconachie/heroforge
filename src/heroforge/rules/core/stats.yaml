# rules/core/stats.yaml
#
# Canonical stat graph definition for D&D 3.5e.
#
# This file declares every standard stat node: its key, dependencies,
# bonus pools, compute strategy, and display metadata.  The rules loader
# reads this file and builds the StatGraph from it — no stat topology is
# hardcoded in Python.
#
# Compute strategies (the `compute` field):
#   base_plus_bonus     : base + sum(pools)  [default if omitted]
#   ability_modifier    : floor((input - 10) / 2)  [single input required]
#   sum                 : sum(all inputs) + sum(pools)
#   max_zero            : max(0, sum(all inputs) + sum(pools))
#   capped_dex          : min(dex_mod, max_dex_bonus); floors at 0
#   bab                 : delegates to character._compute_bab()
#   base_save           : delegates to character._compute_base_save(save_name)
#   hp_max              : delegates to character._compute_hp_max()
#   base_speed          : delegates to character._compute_base_speed()
#   size_attack         : delegates to character._compute_size_mod_attack()
#   ac_total            : 10 + ac_dex_contribution + sum(pools)
#   attack_melee_total  : bab + str_mod + size_attack + sum(pools)
#   attack_ranged_total : bab + dex_mod + size_attack + sum(pools)
#
# Pool keys reference entries in bonus_pools.yaml.
# Dependency ordering matters: each node's inputs must be declared above it.
#
# Fields:
#   key         : unique string identifier used throughout the engine
#   compute     : strategy name (see above)
#   base        : optional integer base value
#   inputs      : list of stat keys this node reads
#   pools       : list of BonusPool keys that feed into this node
#   save_name   : for base_save compute only — "fort", "ref", or "will"
#   description : human-readable label for UI and PDF export
#   sheet       : which character sheet tab primarily displays this stat
#                 (1-5, "familiar", "companion"; omit if internal/derived)

- key: str_score
  compute: base_plus_bonus
  pools:
    - str_score
  description: Strength score
  sheet: 1
- key: dex_score
  compute: base_plus_bonus
  pools:
    - dex_score
  description: Dexterity score
  sheet: 1
- key: con_score
  compute: base_plus_bonus
  pools:
    - con_score
  description: Constitution score
  sheet: 1
- key: int_score
  compute: base_plus_bonus
  pools:
    - int_score
  description: Intelligence score
  sheet: 1
- key: wis_score
  compute: base_plus_bonus
  pools:
    - wis_score
  description: Wisdom score
  sheet: 1
- key: cha_score
  compute: base_plus_bonus
  pools:
    - cha_score
  description: Charisma score
  sheet: 1
- key: str_mod
  compute: ability_modifier
  inputs:
    - str_score
  description: Strength modifier
- key: dex_mod
  compute: ability_modifier
  inputs:
    - dex_score
  description: Dexterity modifier
- key: con_mod
  compute: ability_modifier
  inputs:
    - con_score
  description: Constitution modifier
- key: int_mod
  compute: ability_modifier
  inputs:
    - int_score
  description: Intelligence modifier
- key: wis_mod
  compute: ability_modifier
  inputs:
    - wis_score
  description: Wisdom modifier
- key: cha_mod
  compute: ability_modifier
  inputs:
    - cha_score
  description: Charisma modifier
- key: bab
  compute: bab
  pools:
    - bab_misc
  description: Base Attack Bonus
  sheet: 1
- key: fort_save
  compute: base_save
  save_name: fort
  inputs:
    - con_mod
  pools:
    - fort_save
  description: Fortitude save
  sheet: 1
- key: ref_save
  compute: base_save
  save_name: ref
  inputs:
    - dex_mod
  pools:
    - ref_save
  description: Reflex save
  sheet: 1
- key: will_save
  compute: base_save
  save_name: will
  inputs:
    - wis_mod
  pools:
    - will_save
  description: Will save
  sheet: 1
- key: max_dex_bonus
  compute: max_dex_bonus
  description: Maximum DEX bonus to AC from armour; -1 = uncapped
- key: ac_dex_contribution
  compute: capped_dex
  inputs:
    - dex_mod
    - max_dex_bonus
  description: DEX contribution to AC (capped by armour max dex)
- key: ac
  compute: ac_total
  inputs:
    - ac_dex_contribution
  pools:
    - ac
  description: Armour Class
  sheet: 1
- key: initiative
  compute: sum
  inputs:
    - dex_mod
  pools:
    - initiative
  description: Initiative modifier
  sheet: 1
- key: speed
  compute: base_speed
  pools:
    - speed
  description: Land speed (ft)
  sheet: 1
- key: hp_max
  compute: hp_max
  inputs:
    - con_mod
  pools:
    - hp_bonus
  description: Maximum hit points
  sheet: 1
- key: sr
  compute: sum
  pools:
    - sr
  description: Spell Resistance
  sheet: 1
- key: attack_melee
  compute: attack_melee_total
  inputs:
    - bab
    - str_mod
  pools:
    - attack_melee
    - attack_all
  description: Primary melee attack bonus (before weapon modifiers)
  sheet: 1
- key: attack_ranged
  compute: attack_ranged_total
  inputs:
    - bab
    - dex_mod
  pools:
    - attack_ranged
    - attack_all
  description: Primary ranged attack bonus (before weapon modifiers)
  sheet: 1
- key: damage_str_bonus
  compute: sum
  inputs:
    - str_mod
  pools:
    - damage_melee
    - damage_all
  description: STR bonus to melee damage
  sheet: 1

# Derived pools — aggregated from multiple sources; read
# by named consumer formulas registered in
# engine/derived_pools.py. Companion declarations live in
# rules/core/derived_pools.yaml.
- key: effective_monk_level_ac
  compute: sum
  pools:
    - effective_monk_level_ac
  description: Effective monk level (AC bonus calc input)
