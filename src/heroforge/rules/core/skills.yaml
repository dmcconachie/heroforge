# rules/core/skills.yaml
#
# All D&D 3.5e skills (PHB).
#
# Schema per entry:
#   name         : Canonical skill name
#   key          : pool key used in BonusPool (skill_<snake_case>)
#   ability      : str | dex | con | int | wis | cha
#   trained_only : true if requires at least 1 rank to use
#   armor_check  : true if armor check penalty applies
#   synergies    : list of {skill, bonus} — grant +2 to target when 5+ ranks
#   description  : Brief description

skills:

  - name: Appraise
    key: skill_appraise
    ability: int
    trained_only: false
    armor_check: false
    description: "Determine value of items"

  - name: Balance
    key: skill_balance
    ability: dex
    trained_only: false
    armor_check: true
    description: "Walk on narrow/slippery surfaces"

  - name: Bluff
    key: skill_bluff
    ability: cha
    trained_only: false
    armor_check: false
    synergies:
