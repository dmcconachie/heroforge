#
# Magic items from Sandstorm.
#
# Sorted alphabetically.

Sun Lenses:
  slot: face
  source_book: Sandstorm
  note: >-
    Mundane adventuring gear (10 gp; non-magical) — listed
    here for inventory tracking. Mica or volcanic-glass lenses
    in curved frames; protect the eyes from being dazzled by
    bright light or glare. If already dazzled when donned, the
    wearer is treated as if in shade and recovers from dazzled
    after 1 hour. Sandstorm p. 101 (gear table p. 99).
