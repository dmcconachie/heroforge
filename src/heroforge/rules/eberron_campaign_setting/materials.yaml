# rules/eberron_campaign_setting/materials.yaml
#
# Materials from the Eberron Campaign Setting.
#
# Sorted alphabetically.

Bronzewood:
  source_book: Eberron Campaign Setting
  note: >-
    Wood as hard as iron (hardness 10, 20 hp/inch); can replace
    metal in heavy armor and most weapons. Druids can wear
    bronzewood armor without violating their class restrictions.
    Items weigh 10% less than metal equivalents. Bronzewood
    armor's ACP does not apply to Hide checks in woodland
    environments. Eberron Campaign Setting p. 126.
