Heward's Fortifying Bedroll:
  slot: tool
  source_book: Complete Mage
  note: >-
    1/day, climb in (move action) and rest 1 uninterrupted
    hour to gain the benefits of a full 8 hours of rest:
    eliminates fatigue/exhaustion, natural healing, and
    lets arcane casters prepare/ready spells in that hour.
    Spells cast within the last 8 hours still count against
    daily limits. 3,000 gp. Complete Mage p. 132.
