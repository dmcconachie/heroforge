# rules/complete_mage/feats.yaml
#
# Feats from Complete Mage.
#
# Sorted alphabetically.

Metamagic School Focus (Abjuration):
  kind: passive
  source_book: Complete Mage
  note: >-
    3/day reduce by 1 the metamagic level cost of a metamagic
    feat applied to an Abjuration spell. Prepared casters can
    have at most 3 such reduced-cost spells prepared at once.
    Wizards may take this as a wizard bonus feat. Complete
    Mage p. 45.
  prerequisites:
    feat: Spell Focus (Abjuration)
  effects: []
