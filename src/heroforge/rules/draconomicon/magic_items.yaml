# rules/draconomicon/magic_items.yaml
#
# Magic items from Draconomicon.
#
# Sorted alphabetically.

Gemstone of Heavy Fortification:
  slot: slotless
  source_book: Draconomicon
  note: >-
    Embedded gemstone; must be set into the wearer's hide to
    function (trivial for true dragons; requires limited wish
    or similar for other creatures). Grants the wearer 100%
    chance to negate extra damage from critical hits and sneak
    attacks. Draconomicon p. 83.
