# rules/custom/magic_items.yaml
#
# Homebrew magic items not from any published splatbook.
# Items from published books live under rules/<book>/.
#
# Sorted alphabetically.

Ring of Tharizdun:
  slot: ring
  note: Casts CL 9 delay death on the wearer if needed
Szirb's Shining Helm:
  slot: head
  note: +2 sacred bonus to AC
  effects:
    - target: ac
      bonus_type: sacred
      value: 2
Thieves' Tools, Masterwork:
  slot: tool
  note: >-
    +2 circumstance bonus to Disable Device and Open
    Lock checks.
  effects:
    - target: skill_disable_device
      bonus_type: circumstance
      value: 2
    - target: skill_open_lock
      bonus_type: circumstance
      value: 2
Xan ibn'Duman:
  slot: slotless
  note: >-
    +4 circumstance bonus to Appraise, Hide, Bluff, Move
    Silently, and Knowledge (Local).
  effects:
    - target: skill_appraise
      bonus_type: circumstance
      value: 4
    - target: skill_hide
      bonus_type: circumstance
      value: 4
    - target: skill_bluff
      bonus_type: circumstance
      value: 4
    - target: skill_move_silently
      bonus_type: circumstance
      value: 4
    - target: skill_knowledge_local
      bonus_type: circumstance
      value: 4
