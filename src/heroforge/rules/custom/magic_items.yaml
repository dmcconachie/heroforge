Chronocharm of the Horizon Walker:
  slot: throat
  note: >-
    1/day swift action, treat all terrain as normal for 1 round
    (ignore difficult terrain movement penalties). MIC p. 79.
Chronocharm of the Laughing Rogue:
  slot: throat
  note: >-
    1/day swift action, take an extra move action during your
    turn. MIC p. 79.
